<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    
    <head th:replace="~{general/fragmentos :: head}">
        <title>TechShop - Login</title>
    </head>
    
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>
        
        <div class="container" style="margin-top: 130px; margin-bottom: 80px;">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    
                    <div class="card shadow-lg border-0 rounded-lg">
                        
                        <div class="card-header bg-primary text-white text-center py-3">
                            <h3 class="mb-0"><i class="fas fa-user-circle"></i> [[#{login.login}]]</h3>
                        </div>
                        
                        <div class="card-body p-4">
                            <form method="POST" th:action="@{/login}">
                                
                                <div class="input-group mb-4">
                                    <span class="input-group-text bg-light text-primary"><i class="fas fa-user"></i></span>
                                    <input class="form-control" id="username" type="text" name="username" th:placeholder="#{login.username}" required autofocus/>
                                </div>
                                
                                <div class="input-group mb-4">
                                    <span class="input-group-text bg-light text-primary"><i class="fas fa-lock"></i></span>
                                    <input class="form-control" id="password" type="password" name="password" th:placeholder="#{login.password}" required/>
                                </div>                            
                                
                                <div class="d-grid gap-2 mb-3">
                                    <button class="btn btn-primary btn-lg" type="submit">
                                        <i class="fas fa-sign-in-alt"></i> [[#{login.login}]]
                                    </button>
                                </div>
                                
                                <hr class="my-4">
                                
                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/registro/nuevo}" class="text-decoration-none fw-bold">
                                        <i class="fas fa-user-plus"></i> [[#{accion.registrar}]]
                                    </a>                                
                                    <a th:href="@{/registro/recordar}" class="text-decoration-none text-danger fw-bold">
                                        <i class="fas fa-envelope"></i> [[#{accion.recordar}]]
                                    </a>                                
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <div th:if="${param.error != null}" class="alert alert-danger mt-4 text-center shadow-sm" role="alert">
                        <i class="fas fa-exclamation-triangle"></i> [[#{error.login}]]
                    </div>
                    
                    <div th:if="${param.logout != null}" class="alert alert-success mt-4 text-center shadow-sm" role="alert">
                        <i class="fas fa-check-circle"></i> Has cerrado sesión exitosamente.
                    </div>
                    
                </div>
            </div>
        </div>
        
        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
